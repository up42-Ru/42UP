<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0A">
    <title>42UP — Стримерское комьюнити</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-42">42</span>
                    <span class="logo-up">UP</span>
                </div>
            </div>
            <div class="header-center">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" placeholder="Поиск..." class="search-input" id="searchInput" disabled>
                </div>
            </div>
            <div class="header-right" id="authContainer">
                <!-- Кнопка будет вставлена через JS -->
                <button class="btn btn-primary" onclick="window.authManager?.login()">
                    <i class="fab fa-twitch"></i> Войти через Twitch
                </button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebar-nav">
                    <a href="#/" class="nav-item active" data-page="feed">
                        <i class="fas fa-home"></i>
                        <span>Лента</span>
                    </a>
                    <a href="#/popular" class="nav-item" data-page="popular">
                        <i class="fas fa-fire"></i>
                        <span>Популярное</span>
                    </a>
                    <a href="#/videos" class="nav-item" data-page="videos">
                        <i class="fas fa-video"></i>
                        <span>Видео</span>
                    </a>
                    <a href="#/profile" class="nav-item" data-page="profile">
                        <i class="fas fa-user"></i>
                        <span>Профиль</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <p class="footer-text">
                        Разработано — <a href="https://t.me/yafanof" target="_blank">FanoFFFF</a><br>
                        <a href="https://t.me/up42ss" target="_blank">Телеграм 42UP</a>
                    </p>
                </div>
            </aside>

            <main class="main-content" id="mainContent">
                <div id="pageContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Загрузка...</p>
                    </div>
                </div>
            </main>

            <nav class="mobile-nav" id="mobileNav">
                <a href="#/" class="mobile-nav-item active" data-page="feed">
                    <i class="fas fa-home"></i>
                    <span>Лента</span>
                </a>
                <a href="#/popular" class="mobile-nav-item" data-page="popular">
                    <i class="fas fa-fire"></i>
                    <span>Популярное</span>
                </a>
                <a href="#/videos" class="mobile-nav-item" data-page="videos">
                    <i class="fas fa-video"></i>
                    <span>Видео</span>
                </a>
                <a href="#/profile" class="mobile-nav-item" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Профиль</span>
                </a>
            </nav>
        </div>

        <div id="modalContainer" class="modal-container"></div>
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <!-- ВСЕ СКРИПТЫ ЗАГРУЖАЮТСЯ В ПРАВИЛЬНОМ ПОРЯДКЕ -->
    <script src="config.js"></script>
    <script>
        // Ждём загрузки config
        console.log('Config loaded, CONFIG:', typeof CONFIG !== 'undefined' ? 'OK' : 'FAILED');
    </script>
    <script src="google-sheets.js"></script>
    <script src="auth.js"></script>
    <script>
        // Проверяем что authManager создан
        console.log('Auth loaded, authManager:', typeof authManager !== 'undefined' ? 'OK' : 'FAILED');
        
        // Если authManager не создался - создаём вручную
        if (typeof authManager === 'undefined') {
            console.warn('Creating fallback authManager');
            window.authManager = {
                login: function() {
                    console.log('Fallback login called');
                    const clientId = CONFIG?.TWITCH?.CLIENT_ID || 'lb93nagju8liijf9xdtb17virppha2';
                    const redirectUri = window.location.origin + window.location.pathname;
                    const authUrl = 'https://id.twitch.tv/oauth2/authorize' +
                        '?client_id=' + clientId +
                        '&redirect_uri=' + encodeURIComponent(redirectUri) +
                        '&response_type=token' +
                        '&scope=user:read:email';
                    window.location.href = authUrl;
                },
                logout: function() {
                    localStorage.removeItem('42up_user');
                    location.reload();
                }
            };
        }
    </script>
    <script src="script.js"></script>
    <script src="popular.js"></script>
    <script src="video.js"></script>
    <script src="profile.js"></script>
    <script src="admin.js"></script>
    
    <script>
        // Финальная инициализация
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, starting app...');
            
            // Обновляем кнопку входа
            const savedUser = localStorage.getItem('42up_user');
            if (savedUser) {
                try {
                    window.currentUser = JSON.parse(savedUser);
                    console.log('User restored:', currentUser.display_name);
                    
                    const authContainer = document.getElementById('authContainer');
                    if (authContainer && currentUser) {
                        authContainer.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div onclick="window.location.href='#/profile'" style="display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 4px; background: #252525; border-radius: 20px; cursor: pointer;">
                                    <img src="${currentUser.profile_image_url}" style="width: 32px; height: 32px; border-radius: 50%;">
                                    <span style="color: white; font-size: 14px;">${currentUser.display_name}</span>
                                </div>
                                <button onclick="authManager.logout()" style="padding: 8px 16px; background: #252525; color: white; border: none; border-radius: 6px; cursor: pointer;">
                                    Выйти
                                </button>
                            </div>
                        `;
                    }
                } catch (e) {
                    console.error('Failed to restore user:', e);
                }
            }
            
            // Запускаем приложение
            if (typeof initApp === 'function') {
                initApp();
            } else {
                console.warn('initApp not found, creating fallback');
                window.initApp = function() {
                    document.getElementById('pageContainer').innerHTML = `
                        <div style="padding: 40px; text-align: center;">
                            <h2>42UP</h2>
                            <p>Стримерское комьюнити</p>
                            <p>Сайт загружен, но требуется настройка скриптов</p>
                        </div>
                    `;
                };
                initApp();
            }
        });
    </script>
</body>
</html>
