<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A0A0A">
    <title>42UP — Стримерское комьюнити</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: #FFF; min-height: 100vh; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #1A1A1A; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .logo { font-size: 28px; font-weight: 900; } .logo-42 { color: #FF0000; } .logo-up { color: #0000FF; }
        .btn-twitch { padding: 8px 16px; background: #9147FF; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .btn-twitch:hover { background: #772ce8; }
        .main-layout { display: flex; margin-top: 60px; min-height: calc(100vh - 60px); }
        .sidebar { position: fixed; left: 0; top: 60px; bottom: 0; width: 240px; background: #1A1A1A; border-right: 1px solid #333; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar-nav { flex: 1; padding: 0 12px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #FFF; text-decoration: none; border-radius: 8px; }
        .nav-item:hover { background: #2A2A2A; } .nav-item.active { background: #252525; color: #9147FF; }
        .sidebar-footer { padding: 20px 16px; border-top: 1px solid #333; font-size: 12px; color: #666; }
        .sidebar-footer a { color: #9147FF; text-decoration: none; }
        .main-content { margin-left: 240px; padding: 20px; flex: 1; }
        .container { max-width: 800px; margin: 0 auto; }
        .post-card { background: #1A1A1A; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #333; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; }
        .post-author { font-weight: 600; color: #FFF; }
        .post-time { font-size: 12px; color: #666; }
        .post-content { margin-bottom: 12px; word-break: break-word; }
        .post-image { max-width: 100%; max-height: 400px; border-radius: 8px; margin-bottom: 12px; cursor: pointer; }
        .post-actions { display: flex; gap: 15px; align-items: center; }
        .action-btn { display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: transparent; border: none; color: #999; cursor: pointer; border-radius: 6px; font-size: 14px; }
        .action-btn:hover { background: #252525; }
        .action-btn.liked { color: #00FF00; }
        .action-btn.disliked { color: #FF0000; }
        .create-post { background: #1A1A1A; border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid #333; }
        .create-post textarea { width: 100%; padding: 12px; background: #252525; border: 1px solid #333; border-radius: 8px; color: white; resize: none; font-family: inherit; margin-bottom: 10px; }
        .create-post input { width: 100%; padding: 10px; background: #252525; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 10px; }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #1A1A1A; border-top: 1px solid #333; z-index: 100; }
        .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; text-decoration: none; font-size: 12px; }
        .mobile-nav-item.active { color: #9147FF; }
        .user-profile { display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 4px; background: #252525; border-radius: 20px; cursor: pointer; }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-tab { padding: 8px 16px; background: #252525; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .filter-tab.active { background: #9147FF; }
        .video-categories { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .video-category { padding: 8px 16px; background: #252525; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .video-category.active { background: #9147FF; }
        .video-card { background: #1A1A1A; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .video-thumbnail iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; }
        .video-title { font-size: 18px; font-weight: 600; margin: 10px 0 5px; }
        .video-meta { color: #666; font-size: 13px; margin-bottom: 10px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1A1A1A; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; font-weight: 600; }
        .modal-close { background: none; border: none; color: #999; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #999; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #252525; border: 1px solid #333; border-radius: 8px; color: white; }
        .btn-primary { padding: 10px 20px; background: #9147FF; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-secondary { padding: 8px 16px; background: #252525; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .stream-tag { display: inline-block; padding: 2px 8px; background: rgba(145,71,255,0.2); color: #9147FF; border-radius: 4px; font-size: 12px; margin-left: 8px; }
        .lightbox { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .lightbox img { max-width: 90%; max-height: 90%; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding-bottom: 80px; } .mobile-nav { display: flex; } }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .char-counter { font-size: 12px; color: #666; }
        .char-counter.limit { color: #FF0000; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-left"><div class="logo"><span class="logo-42">42</span><span class="logo-up">UP</span></div></div>
            <div class="header-right" id="authContainer">
                <button class="btn-twitch" onclick="loginWithTwitch()"><i class="fab fa-twitch"></i> Войти через Twitch</button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" data-page="feed"><i class="fas fa-home"></i><span>Лента</span></a>
                    <a href="#" class="nav-item" data-page="popular"><i class="fas fa-fire"></i><span>Популярное</span></a>
                    <a href="#" class="nav-item" data-page="videos"><i class="fas fa-video"></i><span>Видео</span></a>
                    <a href="#" class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Профиль</span></a>
                </nav>
                <div class="sidebar-footer">
                    <a href="https://t.me/yafanof" target="_blank">FanoFFFF</a> | 
                    <a href="https://t.me/up42ss" target="_blank">Телеграм 42UP</a>
                </div>
            </aside>

            <main class="main-content">
                <div class="container" id="content"></div>
            </main>

            <nav class="mobile-nav">
                <a href="#" class="mobile-nav-item active" data-page="feed"><i class="fas fa-home"></i><span>Лента</span></a>
                <a href="#" class="mobile-nav-item" data-page="popular"><i class="fas fa-fire"></i><span>Популярное</span></a>
                <a href="#" class="mobile-nav-item" data-page="videos"><i class="fas fa-video"></i><span>Видео</span></a>
                <a href="#" class="mobile-nav-item" data-page="profile"><i class="fas fa-user"></i><span>Профиль</span></a>
            </nav>
        </div>
    </div>

    <div id="modalContainer"></div>
    <div id="lightboxContainer"></div>

    <script>
        const CONFIG = { TWITCH_CLIENT_ID: '93ar39n31bidquupad43n697o9soqz' };
        let currentUser = null;
        let currentPage = 'feed';
        let currentFilter = 'all';
        let currentVideoCategory = 'hype';
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            console.log('42UP starting...');
            const saved = localStorage.getItem('42up_user');
            if (saved) { try { currentUser = JSON.parse(saved); } catch(e) {} }
            checkTwitchAuth();
            
            // Навигация
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = el.dataset.page;
                    if (page) switchPage(page);
                });
            });
            
            switchPage('feed');
        });
        
        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === page);
            });
            
            if (page === 'feed') showFeed();
            else if (page === 'popular') showPopular();
            else if (page === 'videos') showVideos();
            else if (page === 'profile') showProfile();
            
            updateAuthUI();
        }
        
        // Авторизация
        function loginWithTwitch() {
            const redirectUri = window.location.origin + window.location.pathname;
            window.location.href = 'https://id.twitch.tv/oauth2/authorize?client_id=' + CONFIG.TWITCH_CLIENT_ID + '&redirect_uri=' + encodeURIComponent(redirectUri) + '&response_type=token&scope=user:read:email';
        }
        
        function checkTwitchAuth() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const token = new URLSearchParams(hash.substring(1)).get('access_token');
                if (token) { fetchTwitchUser(token); window.location.hash = ''; }
            }
        }
        
        async function fetchTwitchUser(token) {
            try {
                const resp = await fetch('https://api.twitch.tv/helix/users', { headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': CONFIG.TWITCH_CLIENT_ID } });
                const data = await resp.json();
                if (data.data?.[0]) {
                    const u = data.data[0];
                    currentUser = { id: u.id, login: u.login, display_name: u.display_name, profile_image_url: u.profile_image_url, roles: [], registered_at: new Date().toISOString() };
                    localStorage.setItem('42up_user', JSON.stringify(currentUser));
                    updateAuthUI();
                    switchPage(currentPage);
                }
            } catch(e) { console.error(e); }
        }
        
        function logout() { currentUser = null; localStorage.removeItem('42up_user'); updateAuthUI(); switchPage('feed'); }
        
        function updateAuthUI() {
            const c = document.getElementById('authContainer');
            if (currentUser) {
                c.innerHTML = `<div style="display:flex;align-items:center;gap:10px"><div class="user-profile" onclick="switchPage('profile')"><img src="${currentUser.profile_image_url}"><span>${currentUser.display_name}</span></div><button class="btn-secondary" onclick="logout()">Выйти</button></div>`;
            } else {
                c.innerHTML = `<button class="btn-twitch" onclick="loginWithTwitch()"><i class="fab fa-twitch"></i> Войти через Twitch</button>`;
            }
        }
        
        // База данных (localStorage)
        function getPosts() { return JSON.parse(localStorage.getItem('42up_posts') || '[]'); }
        function savePosts(posts) { localStorage.setItem('42up_posts', JSON.stringify(posts)); }
        function getLikes() { return JSON.parse(localStorage.getItem('42up_likes') || '[]'); }
        function saveLikes(likes) { localStorage.setItem('42up_likes', JSON.stringify(likes)); }
        function getVideos() { return JSON.parse(localStorage.getItem('42up_videos') || '[]'); }
        function saveVideos(videos) { localStorage.setItem('42up_videos', JSON.stringify(videos)); }
        
        // Лента
        function showFeed() {
            let html = '';
            
            // Форма создания
            if (currentUser) {
                html += `<div class="create-post">
                    <textarea id="postText" placeholder="Что нового?" maxlength="150" rows="2"></textarea>
                    <input type="text" id="postImage" placeholder="Ссылка на картинку (imgur, ibb.co, discord...)">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <div><label><input type="checkbox" id="forStream"> Для стрима</label></div>
                        <div><span id="charCount" class="char-counter">0/150</span> <button class="btn-primary" onclick="createPost()">Отправить</button></div>
                    </div>
                </div>`;
            } else {
                html += `<div class="create-post" style="text-align:center"><i class="fab fa-twitch" style="font-size:40px;color:#9147FF;margin-bottom:15px"></i><p style="color:#AAA">Войдите через Twitch, чтобы создавать посты</p></div>`;
            }
            
            // Фильтры
            html += `<div class="filter-tabs">
                <button class="filter-tab ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">Все посты</button>
                <button class="filter-tab ${currentFilter==='stream'?'active':''}" onclick="setFilter('stream')">Для стрима</button>
            </div><div id="postsContainer"></div>`;
            
            document.getElementById('content').innerHTML = html;
            
            const ta = document.getElementById('postText');
            const cc = document.getElementById('charCount');
            if (ta && cc) ta.oninput = () => { cc.textContent = ta.value.length + '/150'; cc.classList.toggle('limit', ta.value.length >= 150); };
            
            renderPosts();
        }
        
        function setFilter(f) { currentFilter = f; showFeed(); }
        
        function renderPosts() {
            const container = document.getElementById('postsContainer');
            if (!container) return;
            
            let posts = getPosts();
            if (currentFilter === 'stream') posts = posts.filter(p => p.for_stream);
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size:48px;margin-bottom:15px"></i><p>Нет постов</p></div>';
                return;
            }
            
            const likes = getLikes();
            
            container.innerHTML = posts.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).map(post => {
                const postLikes = likes.filter(l => l.post_id === post.id);
                const likeCount = postLikes.filter(l => l.type === 'like').length;
                const dislikeCount = postLikes.filter(l => l.type === 'dislike').length;
                const userVote = currentUser ? postLikes.find(l => l.user_id === currentUser.id)?.type : null;
                
                return `<div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <img src="${post.author_avatar || 'https://via.placeholder.com/40'}" class="post-avatar">
                        <div><span class="post-author">${escapeHtml(post.author_name || 'Пользователь')}</span>${post.for_stream?'<span class="stream-tag"><i class="fas fa-video"></i> Для стрима</span>':''}<div class="post-time">${formatDate(post.created_at)}</div></div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    ${post.image_url ? `<img src="${post.image_url}" class="post-image" onclick="openLightbox('${post.image_url}')">` : ''}
                    <div class="post-actions">
                        <button class="action-btn ${userVote==='like'?'liked':''}" onclick="likePost('${post.id}', 'like')"><i class="fas fa-thumbs-up"></i> ${likeCount}</button>
                        <button class="action-btn ${userVote==='dislike'?'disliked':''}" onclick="likePost('${post.id}', 'dislike')"><i class="fas fa-thumbs-down"></i> ${dislikeCount}</button>
                        <button class="action-btn" onclick="reportPost('${post.id}')"><i class="fas fa-flag"></i></button>
                        ${currentUser?.roles?.includes('admin') ? `<button class="action-btn" onclick="deletePost('${post.id}')"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function createPost() {
            const text = document.getElementById('postText')?.value.trim();
            if (!text) return;
            
            const posts = getPosts();
            posts.push({
                id: Date.now() + '-' + Math.random().toString(36),
                content: text,
                image_url: document.getElementById('postImage')?.value.trim() || null,
                for_stream: document.getElementById('forStream')?.checked || false,
                author_id: currentUser?.id,
                author_name: currentUser?.display_name,
                author_avatar: currentUser?.profile_image_url,
                created_at: new Date().toISOString()
            });
            savePosts(posts);
            showFeed();
        }
        
        function likePost(postId, type) {
            if (!currentUser) { alert('Войдите, чтобы оценивать'); return; }
            let likes = getLikes();
            const idx = likes.findIndex(l => l.post_id === postId && l.user_id === currentUser.id);
            if (idx >= 0) {
                if (likes[idx].type === type) likes.splice(idx, 1);
                else likes[idx].type = type;
            } else {
                likes.push({ post_id: postId, user_id: currentUser.id, type });
            }
            saveLikes(likes);
            renderPosts();
        }
        
        function deletePost(postId) {
            if (!currentUser?.roles?.includes('admin')) return;
            const posts = getPosts().filter(p => p.id !== postId);
            savePosts(posts);
            renderPosts();
        }
        
        function reportPost(postId) {
            if (!currentUser) { alert('Войдите, чтобы пожаловаться'); return; }
            showModal('Жалоба', `<select id="reportReason" class="form-group"><option value="spam">Спам</option><option value="inappropriate">Неприемлемый контент</option></select><textarea id="reportComment" placeholder="Комментарий" rows="2"></textarea>`, () => {
                const reason = document.getElementById('reportReason')?.value;
                const comment = document.getElementById('reportComment')?.value;
                const reports = JSON.parse(localStorage.getItem('42up_reports') || '[]');
                reports.push({ id: Date.now(), post_id: postId, reporter_id: currentUser.id, reason, comment, created_at: new Date().toISOString() });
                localStorage.setItem('42up_reports', JSON.stringify(reports));
                alert('Жалоба отправлена');
            });
        }
        
        // Популярное
        function showPopular() {
            const posts = getPosts();
            const likes = getLikes();
            const withRating = posts.map(p => {
                const pl = likes.filter(l => l.post_id === p.id);
                return { ...p, rating: pl.filter(l=>l.type==='like').length - pl.filter(l=>l.type==='dislike').length };
            }).sort((a,b) => b.rating - a.rating);
            
            document.getElementById('content').innerHTML = `<h2 style="margin-bottom:20px"><i class="fas fa-fire" style="color:#FF4500"></i> Популярное</h2><div id="popularContainer">${withRating.length ? withRating.map(p => `<div class="post-card"><div class="post-header"><img src="${p.author_avatar}" class="post-avatar"><div><span class="post-author">${escapeHtml(p.author_name)}</span><div class="post-time">${formatDate(p.created_at)}</div></div><div style="margin-left:auto;color:${p.rating>0?'#0F0':'#F00'}">${p.rating>0?'+':''}${p.rating}</div></div><div class="post-content">${escapeHtml(p.content)}</div>${p.image_url?`<img src="${p.image_url}" class="post-image" onclick="openLightbox('${p.image_url}')">`:''}</div>`).join('') : '<div class="empty-state"><p>Нет постов</p></div>'}</div>`;
        }
        
        // Видео
        function showVideos() {
            let html = `<h2 style="margin-bottom:20px"><i class="fas fa-video" style="color:#9147FF"></i> Видео</h2>`;
            
            if (currentUser) {
                html += `<div class="create-post"><button class="btn-primary" onclick="showAddVideoModal()"><i class="fas fa-plus"></i> Добавить видео</button></div>`;
            }
            
            html += `<div class="video-categories">
                <button class="video-category ${currentVideoCategory==='hype'?'active':''}" onclick="setVideoCategory('hype')">Хайп</button>
                <button class="video-category ${currentVideoCategory==='funny'?'active':''}" onclick="setVideoCategory('funny')">Смешные</button>
                <button class="video-category ${currentVideoCategory==='interesting'?'active':''}" onclick="setVideoCategory('interesting')">Интересные</button>
                <button class="video-category ${currentVideoCategory==='other'?'active':''}" onclick="setVideoCategory('other')">Разное</button>
            </div><div id="videosContainer"></div>`;
            
            document.getElementById('content').innerHTML = html;
            renderVideos();
        }
        
        function setVideoCategory(c) { currentVideoCategory = c; showVideos(); }
        
        function renderVideos() {
            const container = document.getElementById('videosContainer');
            let videos = getVideos().filter(v => v.category === currentVideoCategory);
            videos.sort((a,b) => (b.likes||0) - (a.likes||0));
            
            if (videos.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Нет видео</p></div>';
                return;
            }
            
            container.innerHTML = videos.map(v => {
                const isYouTube = v.url.includes('youtube') || v.url.includes('youtu.be');
                const videoId = extractVideoId(v.url);
                return `<div class="video-card">
                    <div class="post-header"><img src="${v.author_avatar || 'https://via.placeholder.com/40'}" class="post-avatar"><div><span class="post-author">${escapeHtml(v.author_name)}</span><div class="post-time">${formatDate(v.created_at)}</div></div></div>
                    <div class="video-title">${escapeHtml(v.title)}</div>
                    <div class="video-thumbnail">${videoId && isYouTube ? `<iframe src="https://www.youtube.com/embed/${videoId}"></iframe>` : `<a href="${v.url}" target="_blank">Открыть видео</a>`}</div>
                    <div class="video-meta"><i class="fas fa-clock"></i> ${escapeHtml(v.duration)}</div>
                    <div class="post-actions">
                        <button class="action-btn" onclick="likeVideo('${v.id}')"><i class="fas fa-thumbs-up"></i> ${v.likes || 0}</button>
                        ${currentUser?.roles?.includes('admin') ? `<select onchange="updateVideoCategory('${v.id}', this.value)" class="btn-secondary"><option value="hype" ${v.category==='hype'?'selected':''}>Хайп</option><option value="funny" ${v.category==='funny'?'selected':''}>Смешные</option><option value="interesting" ${v.category==='interesting'?'selected':''}>Интересные</option><option value="other" ${v.category==='other'?'selected':''}>Разное</option></select>` : ''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function extractVideoId(url) {
            const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
            return m ? m[1] : '';
        }
        
        function showAddVideoModal() {
            showModal('Добавить видео', `
                <div class="form-group"><label>Ссылка (YouTube)</label><input id="videoUrl" placeholder="https://youtube.com/watch?v=..."></div>
                <div class="form-group"><label>Название</label><input id="videoTitle"></div>
                <div class="form-group"><label>Длительность</label><input id="videoDuration" placeholder="10:30"></div>
            `, () => {
                const url = document.getElementById('videoUrl')?.value;
                const title = document.getElementById('videoTitle')?.value;
                const duration = document.getElementById('videoDuration')?.value;
                if (!url || !title) return;
                const videos = getVideos();
                videos.push({ id: Date.now() + '-' + Math.random(), url, title, duration, category: 'other', likes: 0, author_id: currentUser.id, author_name: currentUser.display_name, author_avatar: currentUser.profile_image_url, created_at: new Date().toISOString() });
                saveVideos(videos);
                showVideos();
            });
        }
        
        function likeVideo(videoId) {
            if (!currentUser) { alert('Войдите'); return; }
            const videos = getVideos();
            const v = videos.find(v => v.id === videoId);
            if (v) { v.likes = (v.likes || 0) + 1; saveVideos(videos); renderVideos(); }
        }
        
        function updateVideoCategory(videoId, category) {
            const videos = getVideos();
            const v = videos.find(v => v.id === videoId);
            if (v) { v.category = category; saveVideos(videos); renderVideos(); }
        }
        
        // Профиль
        function showProfile() {
            if (!currentUser) { showFeed(); return; }
            const registered = new Date(currentUser.registered_at);
            const posts = getPosts().filter(p => p.author_id === currentUser.id);
            
            document.getElementById('content').innerHTML = `
                <div class="post-card">
                    <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
                        <img src="${currentUser.profile_image_url}" style="width:80px;height:80px;border-radius:50%">
                        <div><h2>${currentUser.display_name}</h2><p style="color:#AAA">@${currentUser.login}</p><p style="color:#666">На сайте с ${registered.toLocaleDateString('ru-RU', {month:'long', year:'numeric'})}</p></div>
                    </div>
                    <a href="https://twitch.tv/${currentUser.login}" target="_blank" style="color:#9147FF"><i class="fab fa-twitch"></i> twitch.tv/${currentUser.login}</a>
                </div>
                <h3 style="margin:20px 0">Ваши посты (${posts.length})</h3>
                <div>${posts.length ? posts.map(p => `<div class="post-card"><div class="post-content">${escapeHtml(p.content)}</div>${p.image_url?`<img src="${p.image_url}" class="post-image" onclick="openLightbox('${p.image_url}')">`:''}<div class="post-time">${formatDate(p.created_at)}</div></div>`).join('') : '<p style="color:#666">Нет постов</p>'}</div>
            `;
        }
        
        // Модалки
        function showModal(title, body, onSave) {
            const modal = document.createElement('div'); modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><div class="modal-header"><div class="modal-title">${title}</div><button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button></div><div class="modal-body">${body}</div><div class="modal-footer" style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px"><button class="btn-secondary" onclick="this.closest('.modal').remove()">Отмена</button><button class="btn-primary" id="modalSaveBtn">Сохранить</button></div></div>`;
            document.body.appendChild(modal);
            document.getElementById('modalSaveBtn').onclick = () => { onSave(); modal.remove(); };
        }
        
        function openLightbox(url) {
            const lb = document.createElement('div'); lb.className = 'lightbox';
            lb.innerHTML = `<span class="lightbox-close" onclick="this.parentElement.remove()">&times;</span><img src="${url}">`;
            document.body.appendChild(lb);
            lb.onclick = (e) => { if (e.target === lb) lb.remove(); };
        }
        
        // Вспомогательные
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function formatDate(d) { const dt = new Date(d), n = new Date(), diff = n - dt; if (diff < 6e4) return 'Только что'; if (diff < 36e5) return Math.floor(diff/6e4) + ' мин назад'; if (diff < 864e5) return Math.floor(diff/36e5) + ' ч назад'; return dt.toLocaleDateString('ru-RU'); }
        
        console.log('42UP ready!');
    </script>
</body>
</html>
