<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A0A0A">
    <title>42UP — Стримерское комьюнити</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: #1A1A1A;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        .logo { font-size: 28px; font-weight: 900; }
        .logo-42 { color: #FF0000; }
        .logo-up { color: #0000FF; }
        .btn-twitch {
            padding: 8px 16px;
            background: #9147FF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-twitch:hover { background: #772ce8; }
        .main-layout {
            display: flex;
            margin-top: 60px;
            min-height: calc(100vh - 60px);
        }
        .sidebar {
            position: fixed;
            left: 0; top: 60px; bottom: 0;
            width: 240px;
            background: #1A1A1A;
            border-right: 1px solid #333;
            padding: 20px 0;
        }
        .sidebar-nav { padding: 0 12px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #FFF;
            text-decoration: none;
            border-radius: 8px;
        }
        .nav-item:hover { background: #2A2A2A; }
        .nav-item.active { background: #252525; color: #9147FF; }
        .sidebar-footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 16px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }
        .sidebar-footer a { color: #9147FF; text-decoration: none; }
        .main-content {
            margin-left: 240px;
            padding: 20px;
            flex: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .post-card {
            background: #1A1A1A;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #333;
        }
        .create-post {
            background: #1A1A1A;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .create-post textarea {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            resize: none;
            font-family: inherit;
        }
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: #1A1A1A;
            border-top: 1px solid #333;
        }
        .mobile-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            text-decoration: none;
            font-size: 12px;
        }
        .mobile-nav-item.active { color: #9147FF; }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px 4px 4px;
            background: #252525;
            border-radius: 20px;
            cursor: pointer;
        }
        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-tab {
            padding: 8px 16px;
            background: #252525;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .filter-tab.active {
            background: #9147FF;
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-bottom: 80px; }
            .mobile-nav { display: flex; }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .btn-secondary {
            padding: 8px 16px;
            background: #252525;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-42">42</span>
                    <span class="logo-up">UP</span>
                </div>
            </div>
            <div class="header-right" id="authContainer">
                <button class="btn-twitch" onclick="loginWithTwitch()">
                    <i class="fab fa-twitch"></i> Войти через Twitch
                </button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" onclick="showFeed(); return false;">
                        <i class="fas fa-home"></i><span>Лента</span>
                    </a>
                    <a href="#" class="nav-item" onclick="showPopular(); return false;">
                        <i class="fas fa-fire"></i><span>Популярное</span>
                    </a>
                    <a href="#" class="nav-item" onclick="showVideos(); return false;">
                        <i class="fas fa-video"></i><span>Видео</span>
                    </a>
                    <a href="#" class="nav-item" onclick="showProfile(); return false;">
                        <i class="fas fa-user"></i><span>Профиль</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <a href="https://t.me/yafanof" target="_blank">FanoFFFF</a> | 
                    <a href="https://t.me/up42ss" target="_blank">Телеграм 42UP</a>
                </div>
            </aside>

            <main class="main-content">
                <div class="container" id="content">
                    <!-- Контент будет здесь -->
                </div>
            </main>

            <nav class="mobile-nav">
                <a href="#" class="mobile-nav-item active" onclick="showFeed(); return false;">
                    <i class="fas fa-home"></i><span>Лента</span>
                </a>
                <a href="#" class="mobile-nav-item" onclick="showPopular(); return false;">
                    <i class="fas fa-fire"></i><span>Популярное</span>
                </a>
                <a href="#" class="mobile-nav-item" onclick="showVideos(); return false;">
                    <i class="fas fa-video"></i><span>Видео</span>
                </a>
                <a href="#" class="mobile-nav-item" onclick="showProfile(); return false;">
                    <i class="fas fa-user"></i><span>Профиль</span>
                </a>
            </nav>
        </div>
    </div>

    <script>
        // Конфигурация
        const CONFIG = {
            TWITCH_CLIENT_ID: 'lb93nagju8liijf9xdtb17virppha2'
        };
        
        // Текущий пользователь
        let currentUser = null;
        
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            console.log('42UP starting...');
            
            // Проверяем сохранённого пользователя
            const saved = localStorage.getItem('42up_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    updateAuthUI();
                } catch(e) {
                    console.error('Failed to parse user:', e);
                }
            }
            
            // Проверяем ответ от Twitch
            checkTwitchAuth();
            
            // Показываем ленту
            showFeed();
        });
        
        // Вход через Twitch
        function loginWithTwitch() {
            const redirectUri = window.location.origin + window.location.pathname;
            const authUrl = 'https://id.twitch.tv/oauth2/authorize' +
                '?client_id=' + CONFIG.TWITCH_CLIENT_ID +
                '&redirect_uri=' + encodeURIComponent(redirectUri) +
                '&response_type=token' +
                '&scope=user:read:email';
            
            console.log('Redirecting to Twitch...');
            window.location.href = authUrl;
        }
        
        // Проверка авторизации Twitch
        function checkTwitchAuth() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get('access_token');
                
                if (token) {
                    console.log('Twitch token found, fetching user...');
                    fetchTwitchUser(token);
                    window.location.hash = '';
                }
            }
        }
        
        // Получение данных пользователя из Twitch
        async function fetchTwitchUser(token) {
            try {
                const response = await fetch('https://api.twitch.tv/helix/users', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Client-Id': CONFIG.TWITCH_CLIENT_ID
                    }
                });
                
                const data = await response.json();
                
                if (data.data && data.data[0]) {
                    const u = data.data[0];
                    currentUser = {
                        id: u.id,
                        login: u.login,
                        display_name: u.display_name,
                        profile_image_url: u.profile_image_url,
                        email: u.email || '',
                        roles: [],
                        registered_at: new Date().toISOString()
                    };
                    
                    localStorage.setItem('42up_user', JSON.stringify(currentUser));
                    updateAuthUI();
                    showFeed();
                    
                    console.log('User logged in:', currentUser.display_name);
                }
            } catch(e) {
                console.error('Auth error:', e);
                alert('Ошибка авторизации: ' + e.message);
            }
        }
        
        // Выход
        function logout() {
            currentUser = null;
            localStorage.removeItem('42up_user');
            updateAuthUI();
            showFeed();
        }
        
        // Обновление UI авторизации
        function updateAuthUI() {
            const container = document.getElementById('authContainer');
            
            if (currentUser) {
                container.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="user-profile" onclick="showProfile()">
                            <img src="${currentUser.profile_image_url}" alt="${currentUser.display_name}">
                            <span>${currentUser.display_name}</span>
                        </div>
                        <button class="btn-secondary" onclick="logout()">Выйти</button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <button class="btn-twitch" onclick="loginWithTwitch()">
                        <i class="fab fa-twitch"></i> Войти через Twitch
                    </button>
                `;
            }
        }
        
        // Показать ленту
        function showFeed() {
            const content = document.getElementById('content');
            
            let html = '';
            
            // Форма создания поста (только для авторизованных)
            if (currentUser) {
                html += `
                    <div class="create-post">
                        <textarea id="postText" placeholder="Что нового?" maxlength="150" rows="2"></textarea>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                            <span id="charCount" style="color: #666;">0/150</span>
                            <button class="btn-twitch" onclick="createPost()">Отправить</button>
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="create-post" style="text-align: center;">
                        <i class="fab fa-twitch" style="font-size: 40px; color: #9147FF; margin-bottom: 15px;"></i>
                        <p style="color: #AAA;">Войдите через Twitch, чтобы создавать посты</p>
                    </div>
                `;
            }
            
            // Фильтры
            html += `
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterFeed('all')">Все посты</button>
                    <button class="filter-tab" onclick="filterFeed('stream')">Для стрима</button>
                </div>
            `;
            
            // Посты
            const posts = getPosts();
            
            if (posts.length === 0) {
                html += '<div class="empty-state"><i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 15px;"></i><p>Нет постов</p></div>';
            } else {
                posts.forEach(post => {
                    html += `
                        <div class="post-card">
                            <p style="margin-bottom: 8px;">${escapeHtml(post.content)}</p>
                            <small style="color: #666;">${formatDate(post.created_at)}</small>
                        </div>
                    `;
                });
            }
            
            content.innerHTML = html;
            
            // Счётчик символов
            const textarea = document.getElementById('postText');
            const counter = document.getElementById('charCount');
            if (textarea && counter) {
                textarea.oninput = function() {
                    counter.textContent = this.value.length + '/150';
                };
            }
            
            // Обновление активного пункта меню
            updateActiveNav(0);
        }
        
        // Создание поста
        function createPost() {
            const text = document.getElementById('postText')?.value.trim();
            if (!text) return;
            
            const posts = getPosts();
            posts.unshift({
                id: Date.now(),
                content: text,
                author_id: currentUser?.id,
                author_name: currentUser?.display_name,
                created_at: new Date().toISOString()
            });
            
            localStorage.setItem('42up_posts', JSON.stringify(posts));
            showFeed();
        }
        
        // Получение постов
        function getPosts() {
            const saved = localStorage.getItem('42up_posts');
            return saved ? JSON.parse(saved) : [];
        }
        
        // Фильтр ленты
        function filterFeed(type) {
            // Обновление активной кнопки
            document.querySelectorAll('.filter-tab').forEach((btn, i) => {
                btn.classList.toggle('active', (type === 'all' && i === 0) || (type === 'stream' && i === 1));
            });
            // TODO: применить фильтр
        }
        
        // Показать популярное
        function showPopular() {
            document.getElementById('content').innerHTML = `
                <h2 style="margin-bottom: 20px;"><i class="fas fa-fire" style="color: #FF4500;"></i> Популярное</h2>
                <div class="empty-state">
                    <i class="fas fa-chart-line" style="font-size: 48px; margin-bottom: 15px;"></i>
                    <p>Скоро здесь будут популярные посты</p>
                </div>
            `;
            updateActiveNav(1);
        }
        
        // Показать видео
        function showVideos() {
            document.getElementById('content').innerHTML = `
                <h2 style="margin-bottom: 20px;"><i class="fas fa-video" style="color: #9147FF;"></i> Видео</h2>
                <div class="empty-state">
                    <i class="fas fa-film" style="font-size: 48px; margin-bottom: 15px;"></i>
                    <p>Видео скоро появятся</p>
                </div>
            `;
            updateActiveNav(2);
        }
        
        // Показать профиль
        function showProfile() {
            if (!currentUser) {
                showFeed();
                return;
            }
            
            const registered = new Date(currentUser.registered_at);
            const monthYear = registered.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
            
            document.getElementById('content').innerHTML = `
                <div class="post-card">
                    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                        <img src="${currentUser.profile_image_url}" style="width: 80px; height: 80px; border-radius: 50%;">
                        <div>
                            <h2>${currentUser.display_name}</h2>
                            <p style="color: #AAA;">@${currentUser.login}</p>
                            <p style="color: #666; margin-top: 5px;">На сайте с ${monthYear}</p>
                        </div>
                    </div>
                    <a href="https://twitch.tv/${currentUser.login}" target="_blank" style="color: #9147FF; text-decoration: none;">
                        <i class="fab fa-twitch"></i> twitch.tv/${currentUser.login}
                    </a>
                </div>
                
                <h3 style="margin: 20px 0;">Ваши посты</h3>
                <div id="userPosts"></div>
            `;
            
            // Показать посты пользователя
            const posts = getPosts().filter(p => p.author_id === currentUser.id);
            const container = document.getElementById('userPosts');
            
            if (posts.length === 0) {
                container.innerHTML = '<p style="color: #666;">У вас пока нет постов</p>';
            } else {
                container.innerHTML = posts.map(p => `
                    <div class="post-card">
                        <p>${escapeHtml(p.content)}</p>
                        <small style="color: #666;">${formatDate(p.created_at)}</small>
                    </div>
                `).join('');
            }
            
            updateActiveNav(3);
        }
        
        // Обновление активного пункта меню
        function updateActiveNav(index) {
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        }
        
        // Вспомогательные функции
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Только что';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' мин назад';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч назад';
            
            return date.toLocaleDateString('ru-RU');
        }
        
        console.log('42UP ready!');
    </script>
</body>
</html>
